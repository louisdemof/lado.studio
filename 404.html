<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página não encontrada — Lado Studio</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<style>
  @font-face {
    font-family:'PPFrama';
    src:url('/fonts/PPFramaText-Black.woff2') format('woff2');
    font-weight:900; font-style:normal; font-display:swap;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background:#F5EDD8;
    color:#4C2018;
    font-family:'PPFrama','Degular Display','Unbounded',system-ui,sans-serif;
    text-align:center;
    padding:2rem;
  }
  h1 {
    font-size:clamp(4rem, 12vw, 8rem);
    line-height:1;
    color:#C22A15;
  }
  p {
    font-size:clamp(1rem, 2.5vw, 1.25rem);
    margin-top:1rem;
    font-family:'SupremeLL',system-ui,sans-serif;
  }
  a {
    display:inline-block;
    margin-top:2rem;
    padding:.75rem 1.5rem;
    font-family:'SupremeLL',system-ui,sans-serif;
    font-size:.875rem;
    font-weight:500;
    letter-spacing:.03em;
    text-transform:uppercase;
    text-decoration:none;
    border:1.5px solid #4C2018;
    border-radius:12px;
    color:#4C2018;
    transition:all .2s ease;
  }
  a:hover {
    background:#4C2018;
    color:#F5EDD8;
  }
</style>
</head>
<body>
  <h1>404</h1>
  <p>Esta página não existe — mas nossos objetos sim.</p>
  <a href="/">Voltar ao início</a>
</body>
</html>
